<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Zohlore Studios | High-Retention Video Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0B0B1A;
            --accent-pink: #FF3366;
            --accent-cyan: #00D4FF;
            --text-white: #F0F0F0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- VIDEO BACKGROUND --- */
        .video-bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a2a 0%, #2a0a3a 100%);
        }

        .video-bg-container video {
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .video-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, rgba(11, 11, 26, 0.6), rgba(11, 11, 26, 0.95));
        }

        @media (max-width: 768px) { .video-bg-container video { display: none; } }

        /* --- UI ELEMENTS --- */
        .glass {
            background: rgba(30, 30, 58, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }

        .btn-primary {
            background: var(--accent-pink);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.3);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--accent-pink);
        }

        /* --- NEW VIDEO GRID SYSTEM --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .vertical-embed {
            position: relative;
            padding-bottom: 177.77%; /* Perfect 9:16 Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .vertical-embed:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 212, 255, 0.3);
            border-color: var(--accent-cyan);
        }

        .vertical-embed iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        html { scroll-behavior: smooth; }
    </style>
</head>
<body>

    <div class="video-bg-container">
        <video autoplay muted loop playsinline>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-black/20 backdrop-blur-md border-b border-white/5">
        <div class="text-xl font-extrabold tracking-tighter uppercase">ZOHLORE <span class="text-[#FF3366]">STUDIOS</span></div>
        <div class="flex items-center space-x-6">
            <a href="index.html" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white transition">← Tech Portfolio</a>
            <a href="#contact" class="btn-primary text-xs font-bold uppercase px-6 py-2 rounded-full">Book a Call</a>
        </div>
    </nav>

    <section class="min-h-screen flex items-center px-6 md:px-20">
        <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
            <div class="reveal">
                <h1 class="text-5xl md:text-8xl font-extrabold mb-6 tracking-tighter leading-tight">
                    AI-Driven <br> <span style="color: var(--accent-cyan)">Visual Design</span>
                </h1>
                <p class="text-lg md:text-xl text-gray-300 mb-8">Doubling creator output with AI storytelling.</p>
                <div class="flex flex-wrap gap-4">
                    <a href="#contact" class="btn-primary px-8 py-4 rounded-xl font-bold">Start a Project</a>
                    <a href="#showreel" class="border-2 border-white/20 hover:border-white px-8 py-4 rounded-xl font-bold transition">Watch Showreel</a>
                </div>
            </div>
        </div>
    </section>

    <section id="showreel" class="max-w-7xl mx-auto px-6 py-32 reveal">
        <div class="text-center mb-16">
            <h2 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tighter">Featured Work</h2>
            <p class="text-[#00D4FF] uppercase tracking-widest text-sm font-bold">High-Retention Short Form Systems</p>
        </div>
        
        <div class="video-grid">
            <div class="vertical-embed">
                <iframe src="https://www.youtube.com/embed/418Yr25QDIA?modestbranding=1&rel=0&controls=1" title="Star Wars Edit" frameborder="0" allowfullscreen></iframe>
            </div>
            
            <div class="vertical-embed">
                <iframe src="https://www.youtube.com/embed/7u6Kpsi0fFo?modestbranding=1&rel=0&controls=1" title="Sith Edit" frameborder="0" allowfullscreen></iframe>
            </div>
            
            <div class="vertical-embed">
                <iframe src="https://www.youtube.com/embed/6nbhtiVgR58?modestbranding=1&rel=0&controls=1" title="Neuroneer Edit" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <footer id="contact" class="py-32 text-center border-t border-white/5">
        <h2 class="text-4xl font-extrabold mb-12">Ready to Scale?</h2>
        <div class="flex flex-wrap justify-center gap-6">
            <a href="mailto:your-email@example.com" class="btn-primary px-12 py-5 rounded-2xl font-bold text-xl">Email Zohlore</a>
            <a href="#" class="border-2 border-white/20 hover:border-white px-12 py-5 rounded-2xl font-bold text-xl transition">Connect on LinkedIn</a>
        </div>
        <p class="mt-20 text-[10px] text-gray-700 uppercase tracking-widest">&copy; 2026 Zohlore Studios. All Rights Reserved.</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
